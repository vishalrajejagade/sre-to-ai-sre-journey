apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-pvc-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-pvc-demo
  template:
    metadata:
      labels:
        app: nginx-pvc-demo
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: storage
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: nginx-pvc
``